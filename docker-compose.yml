version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 10000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - backend_uploads:/app/apps/backend/uploads
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s
    command: ["sh", "-c", "cd packages/db && npx prisma migrate deploy && cd /app && node apps/backend/dist/index.js"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # NEXT_PUBLIC_* env vars are inlined into the client bundle at
        # build time. Pass it as a build arg so client components see it,
        # and as a runtime env (below) so server components see it too.
        NEXT_PUBLIC_R2_PUBLIC_URL: ${NEXT_PUBLIC_R2_PUBLIC_URL:-${R2_PUBLIC_URL:-}}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Cap V8 heap so the process OOM-exits cleanly (and gets restarted by
      # `restart: unless-stopped`) instead of falling into a GC thrash spiral
      # when memory climbs from image optimization under Cloudflare-unproxied
      # traffic. 2048 MB heap fits inside the 3072 MB container limit below
      # with ~1 GB headroom for sharp's native libvips buffers (which live
      # outside the V8 heap).
      NODE_OPTIONS: "--max-old-space-size=2048"
      # Tell Next.js to run on the public URL so server-generated absolute
      # links (sitemap, RSS, og:url) emit correct hosts instead of
      # `http://localhost:3000`.
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bechays.com}
      # NEXT_PUBLIC_API_URL is also passed as a build arg above for the
      # client bundle. It must additionally be set at runtime so server
      # components (e.g. sitemap.ts fetching properties + location guides)
      # can resolve it. Without this, sitemap.xml ships with zero property
      # entries — confirmed in production by `curl bechays.com/sitemap.xml`
      # returning only the static marketing routes.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Public R2 bucket URL — when set, the frontend rewrites
      # `/api/files/<key>` URLs into direct R2 URLs in normalizeFileUrl,
      # so the browser fetches images directly from R2 (Cloudflare CDN
      # in front) instead of hopping through our backend container. Cuts
      # ~80% of /api/files/* origin load. Defaults to the existing
      # backend-side R2_PUBLIC_URL so a single Coolify env var sets both.
      NEXT_PUBLIC_R2_PUBLIC_URL: ${NEXT_PUBLIC_R2_PUBLIC_URL:-${R2_PUBLIC_URL:-}}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    # Use the legacy top-level memory keys instead of `deploy.resources` so
    # we can ALSO constrain swap. Compose v3 `deploy.resources` has no
    # equivalent for `memswap_limit` outside of Swarm, and Coolify runs
    # plain `docker compose up` (not Swarm). Without these, Docker defaults
    # to `MemorySwap = 2 × Memory`, which is what caused the recent thrash
    # spiral — at the RAM ceiling the kernel paged sharp buffers into 2 GB
    # of swap and never recovered (vmstat showed 75 MB/s sustained si/so,
    # 55–60% I/O wait, CPU pinned at 100% making zero forward progress).
    # Setting memswap_limit == mem_limit disables swap for this container,
    # so memory pressure produces a clean OOM-kill → restart instead.
    mem_limit: 3072m
    mem_reservation: 1024m
    memswap_limit: 3072m
    mem_swappiness: 0

volumes:
  backend_uploads:
    driver: local

networks:
  coolify:
    external: true
