version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: propgroup-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: propgroup
    ports:
      - "5433:5432"
    volumes:
      - propgroup_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  propgroup_postgres_data:
