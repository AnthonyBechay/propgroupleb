version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 10000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      BACKEND_URL: ${BACKEND_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Cloudflare R2 — required for file uploads
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      # R2_PUBLIC_URL — the public base URL for the R2 bucket.
      # Set to the custom domain: https://assets.propgrouplb.com
      # When set, new uploads are stored with the custom domain URL in the DB
      # instead of a backend proxy URL. Also used as fallback by NEXT_PUBLIC_R2_PUBLIC_URL
      # in the web build if that var is not set explicitly.
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      # API_URL — public URL of this backend (e.g. https://api.propgrp.com).
      # Used by upload.service.ts as the base for /api/files/* proxy URLs that
      # are stored in the database for uploaded files.
      # NOTE: Do NOT use NEXT_PUBLIC_API_URL here — that NEXT_PUBLIC_ prefix is a
      # Next.js build-time convention and is undefined in a plain Node/Express process.
      API_URL: ${API_URL:-${BACKEND_URL:-}}
      # NEXT_PUBLIC_API_URL is still forwarded to the backend for backwards
      # compatibility with any code that reads it, and for validate-env warnings.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Resend transactional email — optional, disables email if absent
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - backend_uploads:/app/apps/backend/uploads
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 120s
    # `prisma db push` syncs the schema to the database without requiring
    # committed migration files — correct for a fresh deployment where no
    # migration history exists. When you later create a real migration baseline
    # (`prisma migrate dev --name init`), switch this back to:
    #   cd packages/db && npx prisma migrate deploy && cd /app && node apps/backend/dist/index.js
    command: ["sh", "-c", "cd packages/db && npx prisma db push --skip-generate --accept-data-loss && cd /app && node apps/backend/dist/index.js"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* build args are inlined into the JS bundle at build time.
        # They must be set here (as build args) AND below (as runtime env vars)
        # because Next.js inlines them for client components at build time but
        # server components read them from process.env at request time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Custom R2 domain — falls back to R2_PUBLIC_URL if not set explicitly,
        # so a single env var (R2_PUBLIC_URL=https://assets.propgrouplb.com) keeps
        # backend + frontend in sync. IMPORTANT: value must be the actual public URL
        # of the bucket. An incorrect value produces site-wide 400 errors on images.
        # Verify first: curl -I https://assets.propgrouplb.com/<some-known-key>
        NEXT_PUBLIC_R2_PUBLIC_URL: ${NEXT_PUBLIC_R2_PUBLIC_URL:-${R2_PUBLIC_URL:-}}
        # NEXT_PUBLIC_SITE_URL is used in robots.ts, sitemap.ts, and layout.tsx
        # metadataBase. Baking it in at build time ensures static pages (OG tags,
        # canonical URLs) get the real domain instead of localhost.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Cap V8 heap so the process OOM-exits cleanly (and gets restarted by
      # `restart: unless-stopped`) instead of falling into a GC thrash spiral
      # when memory climbs from image optimization under Cloudflare-unproxied
      # traffic. 2048 MB heap fits inside the 3072 MB container limit below
      # with ~1 GB headroom for sharp's native libvips buffers (which live
      # outside the V8 heap).
      NODE_OPTIONS: "--max-old-space-size=2048"
      # Runtime values for NEXT_PUBLIC_* vars — mirror the build args above.
      # Needed at runtime so server components (sitemap.ts, robots.ts, layout.tsx)
      # read the real domain from process.env instead of falling back to localhost.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      # normalizeFileUrl() rewrites /api/files/* proxy URLs to this CDN domain,
      # offloading ~80% of image traffic away from the backend container.
      # Falls back to R2_PUBLIC_URL — one env var covers both services.
      NEXT_PUBLIC_R2_PUBLIC_URL: ${NEXT_PUBLIC_R2_PUBLIC_URL:-${R2_PUBLIC_URL:-}}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    # Use the legacy top-level memory keys instead of `deploy.resources` so
    # we can ALSO constrain swap. Compose v3 `deploy.resources` has no
    # equivalent for `memswap_limit` outside of Swarm, and Coolify runs
    # plain `docker compose up` (not Swarm). Without these, Docker defaults
    # to `MemorySwap = 2 × Memory`, which is what caused the recent thrash
    # spiral — at the RAM ceiling the kernel paged sharp buffers into 2 GB
    # of swap and never recovered (vmstat showed 75 MB/s sustained si/so,
    # 55–60% I/O wait, CPU pinned at 100% making zero forward progress).
    # Setting memswap_limit == mem_limit disables swap for this container,
    # so memory pressure produces a clean OOM-kill → restart instead.
    mem_limit: 3072m
    mem_reservation: 1024m
    memswap_limit: 3072m
    mem_swappiness: 0

volumes:
  backend_uploads:
    driver: local

networks:
  coolify:
    external: true
