# Render Blueprint for PropGroup Backend
version: "1"

services:
  - type: web
    name: propgroup
    runtime: node
    repo: https://github.com/AnthonyBechay/propgroup
    plan: free
    region: frankfurt
    buildCommand: cd apps/backend && chmod +x render-build.sh && ./render-build.sh
    startCommand: cd apps/backend && node src/index.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: propgroup-database
          property: connectionString
      # PORT is automatically assigned by Render - do not override
      - key: FRONTEND_URL
        value: https://propgroup-web.vercel.app
      - key: BACKEND_URL
        value: https://propgroup.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

      # Google OAuth (Optional)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://propgroup.onrender.com/api/auth/google/callback

      # Google Gemini AI (Required for AI features)
      - key: GOOGLE_GEMINI_API_KEY
        sync: false

      # Email Services (Optional)
      - key: RESEND_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@propgroup.com
      - key: ADMIN_EMAIL
        value: admin@propgroup.com

databases:
  - name: propgroup-database
    databaseName: propgroup_database
    user: propgroup_database_user
    plan: basic-256mb
    region: frankfurt
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    postgresMajorVersion: "17"
